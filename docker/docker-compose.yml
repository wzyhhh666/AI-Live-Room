version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chatroom-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: chatroom_db
      MYSQL_USER: chatroom
      MYSQL_PASSWORD: chatroom123
    ports:
      - "3309:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d:ro
    networks:
      - chatroom-net
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: chatroom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - chatroom-net
    command: redis-server --appendonly yes

  srs-server:
    image: ossrs/srs:5
    container_name: chatroom-srs
    ports:
      - "1935:1935"
      - "8080:8080"
      - "8088:8088"
      - "1985:1985"
      - "8000:8000/tcp"
      - "8000:8000/udp"
    volumes:
      - ../srs/srs.conf:/usr/local/srs/conf/srs.conf:ro
      - srs-hls-data:/usr/local/srs/objs/nginx/html
    networks:
      - chatroom-net
    restart: unless-stopped

networks:
  chatroom-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  srs-hls-data:
