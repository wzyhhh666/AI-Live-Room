listen              1935;
max_connections     1000;
daemon              off;

# HLS
hls {
    enabled         on;
    hls_fragment    3;
    hls_window      15;
    hls_path        ./objs/nginx/html/hls;
    hls_m3u8_file   [app]/[stream].m3u8;
    hls_ts_file     [app]/[stream]-[seq].ts;
}

# HTTP-FLV
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# HTTP API (also used for WHIP/WHEP WebRTC signaling)
http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

# WebRTC
rtc_server {
    enabled         on;
    listen          8000;
    protocol        udp;
    tcp_candidate   on;
    use_auto_detect_network_ip on;
    ip_family       ipv4;
}

vhost __defaultVhost__ {
    # Convert WebRTC to RTMP so FLV/HLS outputs are generated
    rtc_to_rtmp {
        enabled     on;
    }

    # HTTP-FLV remux
    http_remux {
        enabled     on;
        mount       [app]/[stream].flv;
    }

    # WebRTC
    rtc {
        enabled     on;
    }

    # SRS callbacks
    http_hooks {
        enabled         on;
        on_publish      http://host.docker.internal:3000/api/stream/callback;
        on_unpublish    http://host.docker.internal:3000/api/stream/callback;
    }
}
